# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/snippet_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.defer-datasource-initialization=true
# Server
server.port=8080

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# Logging
logging.level.com.snippets=DEBUG
# Change from create to update
spring.jpa.hibernate.ddl-auto=update

# Disable SQL init since we have errors
spring.sql.init.mode=never
